<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="12" fill="#1a1a2e"/>
  <g stroke="#3b82f6" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- treadmill belt -->
    <rect x="30" y="125" width="140" height="45" rx="6" fill="#3b82f6" opacity="0.1" stroke="none"/>
    <line x1="35" y1="125" x2="165" y2="125" opacity="0.3"/>
    <line x1="35" y1="145" x2="165" y2="145" opacity="0.2"/>
    <line x1="35" y1="165" x2="165" y2="165" opacity="0.3"/>
    <!-- console -->
    <rect x="120" y="40" width="50" height="85" rx="6" fill="none" opacity="0.3"/>
    <line x1="130" y1="50" x2="160" y2="50" opacity="0.4"/>
    <line x1="130" y1="58" x2="160" y2="58" opacity="0.4"/>
    <line x1="130" y1="66" x2="155" y2="66" opacity="0.4"/>
    <!-- person walking -->
    <line x1="80" y1="70" x2="80" y2="115"/>
    <circle cx="80" cy="55" r="11"/>
    <!-- arms swinging -->
    <line x1="80" y1="78" x2="55" y2="90"/>
    <line x1="80" y1="82" x2="105" y2="70"/>
    <!-- legs walking -->
    <line x1="80" y1="115" x2="65" y2="130"/>
    <line x1="65" y1="130" x2="60" y2="125"/>
    <line x1="80" y1="115" x2="95" y2="128"/>
    <line x1="95" y1="128" x2="100" y2="125"/>
    <!-- incline -->
    <line x1="35" y1="170" x2="155" y2="165" stroke-width="4" opacity="0.3"/>
  </g>
</svg>