<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="12" fill="#1a1a2e"/>
  <g stroke="#a855f7" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- mat -->
    <rect x="30" y="140" width="140" height="12" rx="4" fill="#a855f7" opacity="0.2" stroke="none"/>
    <!-- body sitting up -->
    <line x1="100" y1="100" x2="100" y2="140"/>
    <!-- head -->
    <circle cx="100" cy="85" r="11"/>
    <!-- arms -->
    <line x1="100" y1="95" x2="75" y2="80"/>
    <line x1="100" y1="95" x2="125" y2="80"/>
    <!-- legs bent -->
    <line x1="100" y1="140" x2="75" y2="165"/>
    <line x1="100" y1="140" x2="125" y2="165"/>
    <!-- curl motion arrow -->
    <path d="M 120 95 Q 140 90 145 75" opacity="0.4" stroke-width="2" marker-end="url(#arrow)"/>
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7" opacity="0.4"/>
      </marker>
    </defs>
  </g>
</svg>