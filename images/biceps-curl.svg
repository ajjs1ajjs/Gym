<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="12" fill="#1a1a2e"/>
  <g stroke="#e9c46a" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- body -->
    <line x1="100" y1="55" x2="100" y2="130"/>
    <!-- head -->
    <circle cx="100" cy="40" r="12"/>
    <!-- arm curling -->
    <line x1="100" y1="65" x2="120" y2="85"/>
    <line x1="120" y1="85" x2="100" y2="105"/>
    <circle cx="100" cy="105" r="4"/>
    <!-- other arm -->
    <line x1="100" y1="65" x2="75" y2="90"/>
    <line x1="75" y1="90" x2="95" y2="110"/>
    <circle cx="95" cy="110" r="4"/>
    <!-- legs -->
    <line x1="100" y1="130" x2="85" y2="175"/>
    <line x1="100" y1="130" x2="115" y2="175"/>
    <!-- cable/bicep curl machine hint -->
    <line x1="40" y1="30" x2="40" y2="170" opacity="0.2"/>
    <line x1="160" y1="30" x2="160" y2="170" opacity="0.2"/>
  </g>
</svg>