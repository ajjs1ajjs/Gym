<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="12" fill="#1a1a2e"/>
  <g stroke="#2a9d8f" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- body -->
    <line x1="100" y1="60" x2="100" y2="130"/>
    <!-- head -->
    <circle cx="100" cy="45" r="12"/>
    <!-- arms pushing down -->
    <line x1="100" y1="70" x2="100" y2="110"/>
    <line x1="100" y1="110" x2="100" y2="145"/>
    <!-- forearm -->
    <line x1="100" y1="70" x2="80" y2="95"/>
    <line x1="80" y1="95" x2="80" y2="145"/>
    <!-- hands -->
    <rect x="88" y="142" width="24" height="8" rx="2"/>
    <rect x="70" y="142" width="20" height="8" rx="2"/>
    <!-- cable -->
    <line x1="100" y1="15" x2="100" y2="55" opacity="0.3"/>
    <line x1="100" y1="15" x2="80" y2="40" opacity="0.3"/>
    <!-- machine top -->
    <line x1="70" y1="15" x2="130" y2="15" opacity="0.3"/>
    <!-- legs -->
    <line x1="100" y1="130" x2="85" y2="175"/>
    <line x1="100" y1="130" x2="115" y2="175"/>
  </g>
</svg>