<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="12" fill="#1a1a2e"/>
  <g stroke="#f4a261" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- bar -->
    <line x1="40" y1="30" x2="160" y2="30" stroke-width="4"/>
    <!-- cables -->
    <line x1="50" y1="30" x2="50" y2="15" opacity="0.4"/>
    <line x1="150" y1="30" x2="150" y2="15" opacity="0.4"/>
    <line x1="50" y1="15" x2="150" y2="15" opacity="0.4"/>
    <!-- body -->
    <line x1="100" y1="60" x2="100" y2="130"/>
    <!-- head -->
    <circle cx="100" cy="45" r="12"/>
    <!-- arms up holding bar -->
    <line x1="100" y1="65" x2="65" y2="35"/>
    <line x1="100" y1="65" x2="135" y2="35"/>
    <!-- legs -->
    <line x1="100" y1="130" x2="80" y2="175"/>
    <line x1="100" y1="130" x2="120" y2="175"/>
    <!-- knee pad -->
    <rect x="90" y="130" width="20" height="50" rx="3" fill="#f4a261" opacity="0.2" stroke="none"/>
    <!-- seat -->
    <rect x="78" y="170" width="44" height="8" rx="3" fill="#f4a261" opacity="0.3" stroke="none"/>
  </g>
</svg>