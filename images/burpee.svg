<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="12" fill="#1a1a2e"/>
  <g stroke="#e63946" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- jumping figure -->
    <!-- body -->
    <line x1="100" y1="70" x2="100" y2="130"/>
    <!-- head -->
    <circle cx="100" cy="55" r="12"/>
    <!-- arms up (jumping) -->
    <line x1="100" y1="75" x2="60" y2="35"/>
    <line x1="100" y1="75" x2="140" y2="35"/>
    <!-- legs spread (jumping) -->
    <line x1="100" y1="130" x2="70" y2="175"/>
    <line x1="100" y1="130" x2="130" y2="175"/>
    <!-- jump effect lines -->
    <line x1="100" y1="178" x2="100" y2="190" opacity="0.4"/>
    <line x1="85" y1="176" x2="80" y2="186" opacity="0.3"/>
    <line x1="115" y1="176" x2="120" y2="186" opacity="0.3"/>
    <!-- motion lines -->
    <line x1="50" y1="45" x2="35" y2="40" opacity="0.3"/>
    <line x1="150" y1="45" x2="165" y2="40" opacity="0.3"/>
  </g>
</svg>