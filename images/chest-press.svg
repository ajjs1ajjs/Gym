<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" rx="12" fill="#1a1a2e"/>
  <g stroke="#e76f51" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- seat back -->
    <rect x="40" y="60" width="60" height="90" rx="6" fill="#e76f51" stroke="none" opacity="0.15"/>
    <!-- body -->
    <line x1="90" y1="70" x2="95" y2="130"/>
    <!-- head -->
    <circle cx="75" cy="55" r="11"/>
    <!-- arms pressing -->
    <line x1="90" y1="80" x2="130" y2="75"/>
    <line x1="90" y1="85" x2="135" y2="90"/>
    <!-- hands -->
    <circle cx="132" cy="76" r="4"/>
    <circle cx="137" cy="91" r="4"/>
    <!-- handles -->
    <line x1="130" y1="60" x2="130" y2="75" opacity="0.4"/>
    <line x1="135" y1="75" x2="135" y2="90" opacity="0.4"/>
    <!-- legs -->
    <line x1="95" y1="130" x2="80" y2="175"/>
    <line x1="95" y1="130" x2="110" y2="175"/>
    <!-- seat -->
    <rect x="78" y="145" width="40" height="8" rx="3" fill="#e76f51" opacity="0.3" stroke="none"/>
  </g>
</svg>